    </div>

</header>

<main>

    <section>

        <h2>Questを投稿する</h2>

        <div class="form-card">

         <label>タイトル</label>

         <input type="text" placeholder="例：昼休みをもっと楽しくしたい">

         <label>カテゴリ</label>

         <select>

           <option>学校生活</option>

           <option>学習</option>

           <option>地域活動</option>

           <option>イベント</option>

         </select>

         <label>内容</label>

         <textarea placeholder="Questの内容を書いてください"></textarea>

         <a href="post-success.html" class="main-button">

           投稿する

         </a>

        </div>

    </section>

</main>
